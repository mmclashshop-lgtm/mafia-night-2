services:
  - type: web
    name: mafia-server
    env: node
    rootDir: packages/server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: CLIENT_URL
        value: https://mmclashshop-lgtm.github.io
