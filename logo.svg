<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="r" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B0000"/>
      <stop offset="100%" stop-color="#C62828"/>
    </linearGradient>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#DAA520"/>
    </linearGradient>
    <linearGradient id="rg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B0000" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FF4444" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C62828"/>
      <stop offset="100%" stop-color="#8B0000"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#8B0000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Outer ring -->
  <circle cx="60" cy="60" r="56" fill="#0A0A0A" stroke="url(#g)" stroke-width="1.5"/>
  <circle cx="60" cy="60" r="56" fill="url(#rg2)" opacity="0.5"/>
  <circle cx="60" cy="60" r="48" stroke="url(#r)" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.25"/>
  <!-- Crosshair rings -->
  <circle cx="60" cy="60" r="38" stroke="#8B0000" stroke-width="0.7" opacity="0.3"/>
  <!-- Crosshair lines -->
  <line x1="22" y1="60" x2="42" y2="60" stroke="#8B0000" stroke-width="1" opacity="0.35"/>
  <line x1="78" y1="60" x2="98" y2="60" stroke="#8B0000" stroke-width="1" opacity="0.35"/>
  <line x1="60" y1="22" x2="60" y2="38" stroke="#8B0000" stroke-width="1" opacity="0.35"/>
  <line x1="60" y1="82" x2="60" y2="98" stroke="#8B0000" stroke-width="1" opacity="0.35"/>
  <!-- Tick marks -->
  <line x1="60" y1="26" x2="60" y2="30" stroke="url(#g)" stroke-width="1.5" opacity="0.4"/>
  <line x1="60" y1="90" x2="60" y2="94" stroke="url(#g)" stroke-width="1.5" opacity="0.4"/>
  <line x1="26" y1="60" x2="30" y2="60" stroke="url(#g)" stroke-width="1.5" opacity="0.4"/>
  <line x1="90" y1="60" x2="94" y2="60" stroke="url(#g)" stroke-width="1.5" opacity="0.4"/>
  <!-- Mafia Boss Silhouette - Full Suit + Fedora, hands in pockets -->
  <g filter="url(#glow)">
    <!-- Shadow under feet -->
    <ellipse cx="60" cy="98" rx="18" ry="3" fill="#000" opacity="0.3"/>
    <!-- Fedora hat brim -->
    <path d="M36,32 Q60,26 84,32 Q60,36 36,32Z" fill="url(#bodyGrad)" opacity="0.95"/>
    <!-- Fedora crown -->
    <path d="M42,32 L42,18 Q42,12 60,12 Q78,12 78,18 L78,32Z" fill="url(#bodyGrad)" opacity="0.95"/>
    <!-- Hat band -->
    <rect x="42" y="26" width="36" height="3" rx="1.5" fill="url(#g)"/>
    <!-- Crown dent -->
    <path d="M52,16 Q60,20 68,16" stroke="#0A0A0A" stroke-width="1" fill="none" opacity="0.35"/>
    <!-- Face -->
    <path d="M46,32 L46,40 Q46,44 50,44 L70,44 Q74,44 74,40 L74,32Z" fill="url(#bodyGrad)" opacity="0.95"/>
    <!-- Neck -->
    <rect x="52" y="44" width="16" height="6" fill="url(#bodyGrad)" opacity="0.95"/>
    <!-- Suit shoulders -->
    <path d="M34,50 L46,50 L46,56 Q46,60 50,60 L70,60 Q74,60 74,56 L74,50 L86,50 Q88,54 88,60 Q88,72 86,76 L82,78 Q78,76 78,74 L42,74 Q42,76 38,78 L34,76 Q32,72 32,60 Q32,54 34,50Z" fill="url(#bodyGrad)" opacity="0.95"/>
    <!-- Left lapel -->
    <path d="M46,50 L50,56 L48,62 L44,56 Z" fill="#6B0000" opacity="0.5"/>
    <!-- Right lapel -->
    <path d="M74,50 L70,56 L72,62 L76,56 Z" fill="#6B0000" opacity="0.5"/>
    <!-- Tie -->
    <path d="M57,50 L60,56 L63,50 L62,68 L60,72 L58,68 Z" fill="#6B0000" opacity="0.6"/>
    <!-- Suit button -->
    <circle cx="60" cy="64" r="1.5" fill="url(#g)" opacity="0.4"/>
    <!-- Left hand in pocket -->
    <path d="M38,58 Q36,62 34,66 Q36,68 39,66" stroke="#6B0000" stroke-width="1.5" fill="none" opacity="0.5"/>
    <!-- Right hand in pocket -->
    <path d="M82,58 Q84,62 86,66 Q84,68 81,66" stroke="#6B0000" stroke-width="1.5" fill="none" opacity="0.5"/>
    <!-- Left leg -->
    <path d="M48,76 L46,98 L52,98 L54,78Z" fill="url(#bodyGrad)" opacity="0.95"/>
    <!-- Right leg -->
    <path d="M72,76 L74,98 L68,98 L66,78Z" fill="url(#bodyGrad)" opacity="0.95"/>
    <!-- Left shoe -->
    <path d="M46,96 L46,100 L54,100 L54,96Z" fill="#0A0A0A" opacity="0.8"/>
    <!-- Right shoe -->
    <path d="M66,96 L66,100 L74,100 L74,96Z" fill="#0A0A0A" opacity="0.8"/>
    <!-- Trouser crease left -->
    <line x1="50" y1="78" x2="49" y2="96" stroke="#6B0000" stroke-width="0.5" opacity="0.3"/>
    <!-- Trouser crease right -->
    <line x1="70" y1="78" x2="71" y2="96" stroke="#6B0000" stroke-width="0.5" opacity="0.3"/>
  </g>
  <!-- Crosshair center dot -->
  <circle cx="60" cy="54" r="4" fill="url(#g)" opacity="0.7"/>
  <circle cx="60" cy="54" r="1.5" fill="#0A0A0A"/>
</svg>
