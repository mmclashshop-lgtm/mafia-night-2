<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#8B0000"/>
      <stop offset="50%" stopColor="#B22222"/>
      <stop offset="100%" stopColor="#FF4444"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#8B0000" stopOpacity="0.3"/>
      <stop offset="100%" stopColor="#FF4444" stopOpacity="0.1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#8B0000" flood-opacity="0.6"/>
    </filter>
  </defs>
  <!-- Outer ring -->
  <circle cx="60" cy="60" r="56" fill="#0A0A0A" stroke="url(#mainGrad)" stroke-width="2"/>
  <circle cx="60" cy="60" r="56" fill="url(#glowGrad)" opacity="0.5"/>
  <!-- Inner ring -->
  <circle cx="60" cy="60" r="48" stroke="#8B0000" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.3"/>
  <!-- Theater mask -->
  <path d="M32 44 C32 44 40 28 60 28 C80 28 88 44 88 44 C88 60 92 76 88 84 C84 92 74 100 60 100 C46 100 36 92 32 84 C28 76 32 60 32 44Z" fill="url(#mainGrad)" opacity="0.9" filter="url(#shadow)"/>
  <!-- Left eye -->
  <ellipse cx="48" cy="56" rx="8" ry="9" fill="#0A0A0A"/>
  <ellipse cx="48" cy="56" rx="4" ry="4.5" fill="#1A1A1A"/>
  <circle cx="46" cy="53" r="1.5" fill="#333" opacity="0.5"/>
  <!-- Right eye -->
  <ellipse cx="72" cy="56" rx="8" ry="9" fill="#0A0A0A"/>
  <ellipse cx="72" cy="56" rx="4" ry="4.5" fill="#1A1A1A"/>
  <circle cx="70" cy="53" r="1.5" fill="#333" opacity="0.5"/>
  <!-- Eyebrows -->
  <path d="M38 44 Q48 40 56 44" stroke="#FF4444" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M64 44 Q72 40 82 44" stroke="#FF4444" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>
  <!-- Mouth -->
  <path d="M46 76 Q60 88 74 76" stroke="#0A0A0A" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Decorative stars -->
  <circle cx="28" cy="32" r="2" fill="#FF4444" opacity="0.4"/>
  <circle cx="92" cy="32" r="2" fill="#FF4444" opacity="0.4"/>
  <circle cx="24" cy="70" r="1.5" fill="#FF4444" opacity="0.3"/>
  <circle cx="96" cy="70" r="1.5" fill="#FF4444" opacity="0.3"/>
</svg>
