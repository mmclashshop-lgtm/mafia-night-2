version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
      - CLIENT_URL=http://localhost:5173
    volumes:
      - server-data:/app/packages/server/data

volumes:
  server-data:
